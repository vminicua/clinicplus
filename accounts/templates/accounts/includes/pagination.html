{% if page_obj.paginator.num_pages > 1 %}
  <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 px-4 py-3 border-top">
    <p class="text-sm text-secondary mb-0">
      Página {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}
    </p>

    <nav aria-label="Paginação">
      <ul class="pagination pagination-sm mb-0">
        {% if page_obj.has_previous %}
          <li class="page-item">
            <a class="page-link" href="?page={{ page_obj.previous_page_number }}{{ pagination_query }}">Anterior</a>
          </li>
        {% endif %}

        <li class="page-item active">
          <span class="page-link">{{ page_obj.number }}</span>
        </li>

        {% if page_obj.has_next %}
          <li class="page-item">
            <a class="page-link" href="?page={{ page_obj.next_page_number }}{{ pagination_query }}">Seguinte</a>
          </li>
        {% endif %}
      </ul>
    </nav>
  </div>
{% endif %}

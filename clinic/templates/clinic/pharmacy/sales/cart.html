{% extends "accounts/layouts/base.html" %}

{% block content %}
  {% include "clinic/pharmacy/sales/includes/page_shell.html" %}
{% endblock content %}

{% block extra_js %}
<script>
  (function() {
    let pharmacySelectorPayload = null;

    function getCsrfToken() {
      const cookie = document.cookie
        .split('; ')
        .find((row) => row.startsWith('csrftoken='));
      return cookie ? decodeURIComponent(cookie.split('=')[1]) : '';
    }

    function getActionValue(form) {
      return form.querySelector('input[name="cart_action"], input[name="action"]')?.value || '';
    }

    function getRequestUrl(form) {
      return form.getAttribute('action') || window.location.href;
    }

    function setButtonBusy(button, isBusy) {
      if (!button) {
        return;
      }
      if (!button.dataset.originalHtml) {
        button.dataset.originalHtml = button.innerHTML;
      }
      button.disabled = isBusy;
      button.innerHTML = isBusy
        ? '<i class="material-symbols-rounded text-sm me-1">hourglass_top</i>A processar'
        : button.dataset.originalHtml;
    }

    function triggerSelectRefresh(field) {
      if (!field || !window.jQuery) {
        return;
      }
      window.jQuery(field).trigger('change.select2');
    }

    function setItemSummary(form, text) {
      const summaryText = form.querySelector('[data-pharmacy-item-summary-text]');
      if (summaryText) {
        summaryText.textContent = text;
      }
    }

    function setItemHint(form, text) {
      const quickHint = form.querySelector('[data-pharmacy-add-hint]');
      if (quickHint) {
        quickHint.textContent = text;
      }
    }

    function getDefaultSelectorPayload() {
      return {
        currency: 'MZN',
        labels: {
          selectWarehouse: 'Seleccione primeiro o armazém para orientar a escolha do produto.',
          selectProduct: 'Seleccione o produto para ver preço e stock disponível.',
          outOfStock: 'Sem stock disponível neste armazém.',
          available: 'Disponível',
          reserved: 'Já no carrinho',
          canAdd: 'Pode adicionar até',
          unitPrice: 'Preço unitário',
        },
        items: {
          medicamento: {},
          consumivel: {},
        },
      };
    }

    function getSelectorPayload() {
      if (pharmacySelectorPayload) {
        return pharmacySelectorPayload;
      }

      const node = document.getElementById('pharmacy-selector-payload');
      if (!node) {
        pharmacySelectorPayload = getDefaultSelectorPayload();
        return pharmacySelectorPayload;
      }

      try {
        pharmacySelectorPayload = JSON.parse(node.textContent);
      } catch (error) {
        pharmacySelectorPayload = getDefaultSelectorPayload();
      }

      return pharmacySelectorPayload;
    }

    function setSelectorPayload(payload) {
      if (payload && typeof payload === 'object') {
        pharmacySelectorPayload = payload;
      }
    }

    function syncPharmacyAddForm(root) {
      const form = root.querySelector('[data-pharmacy-add-form="1"]');
      if (!form) {
        return;
      }

      const itemTypeField = form.querySelector('select[name="item_type"]');
      const warehouseField = form.querySelector('select[name="warehouse"]');
      const medicationField = form.querySelector('select[name="medicamento"]');
      const consumableField = form.querySelector('select[name="consumivel"]');
      const quantityField = form.querySelector('input[name="quantity"]');
      const addButton = form.querySelector('[data-pharmacy-add-button]');
      const medicationWrapper = form.querySelector('[data-pharmacy-field="medicamento"]');
      const consumableWrapper = form.querySelector('[data-pharmacy-field="consumivel"]');

      if (!itemTypeField || !warehouseField || !medicationField || !consumableField || !quantityField) {
        return;
      }

      const refresh = () => {
        const selectorPayload = getSelectorPayload();
        const labels = {
          ...getDefaultSelectorPayload().labels,
          ...(selectorPayload.labels || {}),
        };
        const currency = selectorPayload.currency || 'MZN';
        const itemType = itemTypeField.value || 'medicamento';
        const warehouseId = warehouseField.value || '';
        const activeField = itemType === 'consumivel' ? consumableField : medicationField;
        const inactiveField = itemType === 'consumivel' ? medicationField : consumableField;
        const selectedItemId = activeField.value || '';

        if (medicationWrapper) {
          medicationWrapper.classList.toggle('d-none', itemType !== 'medicamento');
        }
        if (consumableWrapper) {
          consumableWrapper.classList.toggle('d-none', itemType !== 'consumivel');
        }
        if (inactiveField.value) {
          inactiveField.value = '';
          triggerSelectRefresh(inactiveField);
        }

        if (!warehouseId) {
          quantityField.max = '';
          if (!quantityField.value || Number(quantityField.value) < 1) {
            quantityField.value = '1';
          }
          setItemSummary(form, labels.selectWarehouse);
          setItemHint(form, '');
          if (addButton) {
            addButton.disabled = true;
          }
          return;
        }

        if (!selectedItemId) {
          quantityField.max = '';
          if (!quantityField.value || Number(quantityField.value) < 1) {
            quantityField.value = '1';
          }
          setItemSummary(form, labels.selectProduct);
          setItemHint(form, '');
          if (addButton) {
            addButton.disabled = true;
          }
          return;
        }

        const selectedItem = selectorPayload.items?.[itemType]?.[selectedItemId] || null;
        const warehouseStock = selectedItem?.warehouses?.[warehouseId] || null;
        const remaining = Number(warehouseStock?.remaining || 0);
        const available = Number(warehouseStock?.available || 0);
        const reserved = Number(warehouseStock?.reserved || 0);

        if (remaining > 0) {
          quantityField.max = String(remaining);
          if (!quantityField.value || Number(quantityField.value) < 1) {
            quantityField.value = '1';
          } else if (Number(quantityField.value) > remaining) {
            quantityField.value = String(remaining);
          }
        } else {
          quantityField.max = '';
          quantityField.value = '1';
        }

        if (!selectedItem) {
          setItemSummary(form, labels.outOfStock);
          setItemHint(form, '');
          if (addButton) {
            addButton.disabled = true;
          }
          return;
        }

        if (!warehouseStock || remaining <= 0) {
          setItemSummary(
            form,
            `${selectedItem.label} · ${labels.available}: ${available} ${selectedItem.unit_label} · ${labels.reserved}: ${reserved} · ${labels.outOfStock}`
          );
          setItemHint(form, `${labels.unitPrice}: ${selectedItem.unit_price} ${currency} / ${selectedItem.unit_label}`);
          if (addButton) {
            addButton.disabled = true;
          }
          return;
        }

        setItemSummary(
          form,
          `${selectedItem.label} · ${labels.available}: ${available} ${selectedItem.unit_label} · ${labels.reserved}: ${reserved} · ${labels.canAdd}: ${remaining}.`
        );
        setItemHint(form, `${labels.unitPrice}: ${selectedItem.unit_price} ${currency} / ${selectedItem.unit_label}`);

        if (addButton) {
          addButton.disabled = false;
        }
      };

      if (form.dataset.pharmacyReady !== '1') {
        form.dataset.pharmacyReady = '1';
        form.addEventListener('change', refresh);
        form.addEventListener('input', refresh);
      }

      refresh();
    }

    function replacePartial(selector, html) {
      const target = document.querySelector(selector);
      if (!target || typeof html !== 'string') {
        return null;
      }
      target.innerHTML = html;
      return target;
    }

    async function submitPharmacyForm(form) {
      const submitButton = form.querySelector('button[type="submit"]');
      setButtonBusy(submitButton, true);
      try {
        const response = await fetch(getRequestUrl(form), {
          method: (form.method || 'post').toUpperCase(),
          body: new FormData(form),
          headers: {
            'X-Requested-With': 'XMLHttpRequest',
            'X-CSRFToken': getCsrfToken(),
            'Accept': 'application/json',
          },
        });
        const data = await response.json();
        setSelectorPayload(data.selector_payload);
        replacePartial('[data-pharmacy-stats]', data.stats_html);
        replacePartial('[data-pharmacy-cart-card]', data.cart_card_html);
        replacePartial('[data-pharmacy-checkout-summary]', data.checkout_summary_html);

        if (data.add_form_html) {
          const addFormShell = replacePartial('[data-pharmacy-add-form-shell]', data.add_form_html);
          if (addFormShell && window.clinicShell && typeof window.clinicShell.init === 'function') {
            window.clinicShell.init(addFormShell);
          }
        }

        syncPharmacyAddForm(document);

        if (!response.ok) {
          if (window.clinicShell && typeof window.clinicShell.showFeedback === 'function') {
            window.clinicShell.showFeedback('error', 'Dados por corrigir', data.message || 'Revise os campos destacados e tente novamente.');
          }
          return;
        }

        if (data.message && window.clinicShell && typeof window.clinicShell.showFeedback === 'function') {
          window.clinicShell.showFeedback('success', 'Sucesso', data.message);
        }

        if (getActionValue(form) === 'add_item' && !data.add_form_html) {
          const itemTypeField = document.querySelector('[data-pharmacy-add-form="1"] select[name="item_type"]');
          const medicationField = document.querySelector('[data-pharmacy-add-form="1"] select[name="medicamento"]');
          const consumableField = document.querySelector('[data-pharmacy-add-form="1"] select[name="consumivel"]');
          const quantityField = document.querySelector('[data-pharmacy-add-form="1"] input[name="quantity"]');
          const activeField = itemTypeField && itemTypeField.value === 'consumivel' ? consumableField : medicationField;

          if (activeField) {
            activeField.value = '';
            triggerSelectRefresh(activeField);
          }
          if (quantityField) {
            quantityField.value = '1';
          }
          syncPharmacyAddForm(document);
        }

        return data;
      } finally {
        setButtonBusy(submitButton, false);
      }
    }

    document.addEventListener('submit', (event) => {
      const form = event.target.closest('form[data-pharmacy-async-form="1"]');
      if (!form) {
        return;
      }

      event.preventDefault();
      submitPharmacyForm(form).catch((error) => {
        console.error(error);
        if (window.clinicShell && typeof window.clinicShell.showFeedback === 'function') {
          window.clinicShell.showFeedback('error', 'Erro', 'O processamento do carrinho falhou.');
        }
      });
    });

    document.addEventListener('DOMContentLoaded', () => {
      getSelectorPayload();
      syncPharmacyAddForm(document);
    });
  })();
</script>
{% endblock extra_js %}

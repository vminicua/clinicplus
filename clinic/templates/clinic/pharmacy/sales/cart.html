{% extends "accounts/layouts/base.html" %}

{% block content %}
  {% include "clinic/pharmacy/sales/includes/page_shell.html" %}
{% endblock content %}

{% block extra_js %}
<script>
  (function() {
    function getCsrfToken() {
      const cookie = document.cookie
        .split('; ')
        .find((row) => row.startsWith('csrftoken='));
      return cookie ? decodeURIComponent(cookie.split('=')[1]) : '';
    }

    function parseShell(html) {
      const parser = new DOMParser();
      const documentNode = parser.parseFromString(html, 'text/html');
      return documentNode.querySelector('.clinic-page-shell');
    }

    function readSelectorPayload() {
      const payloadNode = document.getElementById('pharmacy-selector-data');
      if (!payloadNode) {
        return null;
      }

      try {
        return JSON.parse(payloadNode.textContent);
      } catch (error) {
        console.error(error);
        return null;
      }
    }

    function getActionValue(form) {
      return form.querySelector('input[name="cart_action"], input[name="action"]')?.value || '';
    }

    function getRequestUrl(form) {
      return form.getAttribute('action') || window.location.href;
    }

    function syncProductFieldOptions(field, itemsByType, warehouseId) {
      if (!field) {
        return;
      }

      Array.from(field.options).forEach((option) => {
        if (!option.value) {
          option.disabled = false;
          option.hidden = false;
          return;
        }

        if (!warehouseId) {
          option.disabled = false;
          option.hidden = false;
          return;
        }

        const itemData = itemsByType?.[option.value];
        const warehouseData = itemData?.warehouses?.[warehouseId];
        const hasRemainingStock = !!warehouseData && Number(warehouseData.remaining || 0) > 0;
        option.disabled = !hasRemainingStock;
        option.hidden = !hasRemainingStock;
      });
    }

    function triggerSelectRefresh(field) {
      if (!field || !window.jQuery) {
        return;
      }
      window.jQuery(field).trigger('change.select2');
    }

    function syncPharmacyAddForm(root) {
      const form = root.querySelector('[data-pharmacy-add-form="1"]');
      if (!form) {
        return;
      }

      const payload = readSelectorPayload();
      if (!payload) {
        return;
      }

      const itemTypeField = form.querySelector('select[name="item_type"]');
      const warehouseField = form.querySelector('select[name="warehouse"]');
      const medicationField = form.querySelector('select[name="medicamento"]');
      const consumableField = form.querySelector('select[name="consumivel"]');
      const quantityField = form.querySelector('input[name="quantity"]');
      const addButton = form.querySelector('[data-pharmacy-add-button]');
      const summaryText = form.querySelector('[data-pharmacy-item-summary-text]');
      const quickHint = form.querySelector('[data-pharmacy-add-hint]');
      const medicationWrapper = form.querySelector('[data-pharmacy-field="medicamento"]');
      const consumableWrapper = form.querySelector('[data-pharmacy-field="consumivel"]');

      if (!itemTypeField || !warehouseField || !medicationField || !consumableField || !quantityField) {
        return;
      }

      const refresh = () => {
        const itemType = itemTypeField.value || 'medicamento';
        const warehouseId = warehouseField.value || '';
        const activeField = itemType === 'consumivel' ? consumableField : medicationField;
        const inactiveField = itemType === 'consumivel' ? medicationField : consumableField;

        if (medicationWrapper) {
          medicationWrapper.classList.toggle('d-none', itemType !== 'medicamento');
        }
        if (consumableWrapper) {
          consumableWrapper.classList.toggle('d-none', itemType !== 'consumivel');
        }

        syncProductFieldOptions(medicationField, payload.items?.medicamento, warehouseId);
        syncProductFieldOptions(consumableField, payload.items?.consumivel, warehouseId);

        if (activeField.value && activeField.selectedOptions[0]?.disabled) {
          activeField.value = '';
          triggerSelectRefresh(activeField);
        }

        if (inactiveField.value && inactiveField.selectedOptions[0]?.disabled) {
          inactiveField.value = '';
          triggerSelectRefresh(inactiveField);
        }

        const itemsByType = payload.items?.[itemType] || {};
        const currentItemId = activeField.value || '';
        const itemData = itemsByType[currentItemId];
        const warehouseData = itemData?.warehouses?.[warehouseId];
        const available = Number(warehouseData?.available || 0);
        const reserved = Number(warehouseData?.reserved || 0);
        const remaining = Number(warehouseData?.remaining || 0);

        if (!warehouseId) {
          quantityField.max = '';
          if (!quantityField.value || Number(quantityField.value) < 1) {
            quantityField.value = '1';
          }
          if (summaryText) {
            summaryText.textContent = payload.labels?.selectWarehouse || '';
          }
          if (quickHint) {
            quickHint.textContent = '';
          }
          if (addButton) {
            addButton.disabled = true;
          }
          return;
        }

        if (!activeField.value) {
          quantityField.max = '';
          if (!quantityField.value || Number(quantityField.value) < 1) {
            quantityField.value = '1';
          }
          if (summaryText) {
            summaryText.textContent = payload.labels?.selectProduct || '';
          }
          if (quickHint) {
            quickHint.textContent = '';
          }
          if (addButton) {
            addButton.disabled = true;
          }
          return;
        }

        if (!itemData) {
          quantityField.max = '';
          quantityField.value = '1';
          if (summaryText) {
            summaryText.textContent = payload.labels?.outOfStock || '';
          }
          if (quickHint) {
            quickHint.textContent = '';
          }
          if (addButton) {
            addButton.disabled = true;
          }
          return;
        }

        if (remaining > 0) {
          quantityField.max = String(remaining);
          if (!quantityField.value || Number(quantityField.value) < 1) {
            quantityField.value = '1';
          } else if (Number(quantityField.value) > remaining) {
            quantityField.value = String(remaining);
          }
        } else {
          quantityField.max = '';
          quantityField.value = '1';
        }

        if (summaryText) {
          if (remaining > 0) {
            summaryText.textContent = `${itemData.label} · ${payload.labels?.available}: ${available} ${itemData.unit_label} · ${payload.labels?.reserved}: ${reserved} · ${payload.labels?.canAdd}: ${remaining}.`;
          } else {
            summaryText.textContent = `${itemData.label} · ${payload.labels?.outOfStock}`;
          }
        }

        if (quickHint) {
          quickHint.textContent = `${payload.labels?.unitPrice}: ${itemData.unit_price} ${payload.currency} / ${itemData.unit_label}`;
        }

        if (addButton) {
          addButton.disabled = remaining <= 0;
        }
      };

      if (form.dataset.pharmacyReady !== '1') {
        form.dataset.pharmacyReady = '1';
        form.addEventListener('change', refresh);
        form.addEventListener('input', refresh);
      }

      refresh();
    }

    async function submitPharmacyForm(form) {
      const response = await fetch(getRequestUrl(form), {
        method: (form.method || 'post').toUpperCase(),
        body: new FormData(form),
        headers: {
          'X-Requested-With': 'XMLHttpRequest',
          'X-CSRFToken': getCsrfToken(),
        },
      });

      const html = await response.text();
      const nextShell = parseShell(html);
      const currentShell = document.querySelector('.clinic-page-shell');

      if (!nextShell || !currentShell) {
        window.location.reload();
        return;
      }

      currentShell.replaceWith(nextShell);
      if (window.clinicShell && typeof window.clinicShell.init === 'function') {
        window.clinicShell.init(document);
      }
      syncPharmacyAddForm(document);

      if (!response.ok) {
        if (window.clinicShell && typeof window.clinicShell.showFeedback === 'function') {
          window.clinicShell.showFeedback('error', 'Dados por corrigir', 'Revise os campos destacados e tente novamente.');
        }
        return;
      }

      const action = getActionValue(form);
      const messages = {
        add_item: 'Item adicionado ao carrinho.',
        remove_item: 'Item removido do carrinho.',
        clear_cart: 'Carrinho limpo com sucesso.',
      };

      if (messages[action] && window.clinicShell && typeof window.clinicShell.showFeedback === 'function') {
        window.clinicShell.showFeedback('success', 'Sucesso', messages[action]);
      }
    }

    document.addEventListener('submit', (event) => {
      const form = event.target.closest('form[data-pharmacy-async-form="1"]');
      if (!form) {
        return;
      }

      event.preventDefault();
      submitPharmacyForm(form).catch((error) => {
        console.error(error);
        if (window.clinicShell && typeof window.clinicShell.showFeedback === 'function') {
          window.clinicShell.showFeedback('error', 'Erro', 'O processamento do carrinho falhou.');
        }
      });
    });

    document.addEventListener('DOMContentLoaded', () => {
      syncPharmacyAddForm(document);
    });
  })();
</script>
{% endblock extra_js %}

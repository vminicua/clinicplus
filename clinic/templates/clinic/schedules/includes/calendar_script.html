{% load ui_extras %}
<script>
  (function() {
    const root = document.querySelector('[data-schedule-studio]');
    const dataNode = document.getElementById('schedule-calendar-data');
    if (!root || !dataNode) {
      return;
    }

    const locale = (document.documentElement.lang || 'pt').startsWith('en') ? 'en-US' : 'pt-PT';
    const labels = {
      noItemsDay: '{% ui "Nenhum turno cai nesta data dentro dos filtros actuais." "No shifts fall on this date inside the current filters." %}',
      noItemsRange: '{% ui "Não existem horários para mostrar nesta combinação de filtros e período." "There are no schedules to show in this filter and range combination." %}',
      noBreak: '{% ui "Sem pausa registada" "No break recorded" %}',
      noNotes: '{% ui "Sem observações adicionais." "No additional notes." %}',
      noNext: '{% ui "Sem próxima ocorrência" "No next occurrence" %}',
      baseShift: '{% ui "Turno base" "Base shift" %}',
      bookingReady: '{% ui "Pronto para agenda" "Booking-ready" %}',
      independent: '{% ui "Independente da agenda" "Independent from bookings" %}',
      noDoctor: '{% ui "Sem perfil médico ligado" "No linked doctor profile" %}',
      futureAppointments: '{% ui "marcação(ões) futuras" "future booking(s)" %}',
      todayShort: '{% ui "hoje" "today" %}',
      selectedShift: '{% ui "Turno seleccionado" "Selected shift" %}',
      daySnapshot: '{% ui "Leitura do dia" "Day snapshot" %}',
      visibleRange: '{% ui "No período visível" "In the visible range" %}',
      shifts: '{% ui "Turnos" "Shifts" %}',
      professionals: '{% ui "Profissionais" "Professionals" %}',
      readyToSync: '{% ui "Prontos para sincronizar" "Ready to sync" %}',
      branch: '{% ui "Clínica" "Clinic" %}',
      shift: '{% ui "Turno" "Shift" %}',
      pause: '{% ui "Pausa" "Break" %}',
      duration: '{% ui "Duração do bloco" "Slot length" %}',
      bookingMode: '{% ui "Modo de agenda" "Booking mode" %}',
      nextOccurrence: '{% ui "Próxima ocorrência" "Next occurrence" %}',
      validity: '{% ui "Vigência" "Validity" %}',
      openDetails: '{% ui "Abrir detalhes" "Open details" %}',
      edit: '{% ui "Editar" "Edit" %}',
      activate: '{% ui "Activar" "Activate" %}',
      deactivate: '{% ui "Desactivar" "Deactivate" %}',
      listView: '{% ui "Vista em lista" "List view" %}',
      dayView: '{% ui "Vista diária" "Daily view" %}',
      more: '{% ui "mais" "more" %}',
      onlyVisible: '{% ui "Só este turno está visível nesta data pelos filtros actuais." "Only this shift is visible on this date for the current filters." %}',
    };

    const schedules = JSON.parse(dataNode.textContent || '[]');
    const canvas = root.querySelector('[data-calendar-canvas]');
    const sidebar = root.querySelector('[data-calendar-sidebar]');
    const roleFilter = root.querySelector('[data-calendar-role-filter]');
    const branchFilter = root.querySelector('[data-calendar-branch-filter]');
    const searchInput = root.querySelector('[data-calendar-search]');
    const rangeLabel = root.querySelector('[data-calendar-range-label]');
    const todayHero = root.querySelector('[data-calendar-today-hero]');

    const params = new URLSearchParams(window.location.search);
    const today = toStart(parseISO(root.dataset.anchorDate));
    const state = {
      view: normalizeView(params.get('view')),
      anchor: toStart(parseISO(params.get('date')) || today),
      selectedDate: toStart(parseISO(params.get('date')) || today),
      selectedOccurrenceKey: null,
      role: 'all',
      branch: 'all',
      status: 'active',
      query: '',
    };

    function normalizeView(value) {
      return ['list', 'day', 'week', 'month'].includes(value) ? value : 'week';
    }

    function parseISO(value) {
      if (!value || typeof value !== 'string') return null;
      const match = value.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!match) return null;
      return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
    }

    function toStart(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function addDays(date, amount) {
      const next = new Date(date);
      next.setDate(next.getDate() + amount);
      return toStart(next);
    }

    function sameDate(left, right) {
      return !!left && !!right && left.getFullYear() === right.getFullYear() && left.getMonth() === right.getMonth() && left.getDate() === right.getDate();
    }

    function iso(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    function mondayIndex(date) {
      return (date.getDay() + 6) % 7;
    }

    function startOfWeek(date) {
      return addDays(date, -mondayIndex(date));
    }

    function endOfWeek(date) {
      return addDays(startOfWeek(date), 6);
    }

    function monthGridStart(date) {
      return startOfWeek(new Date(date.getFullYear(), date.getMonth(), 1));
    }

    function monthGridEnd(date) {
      return endOfWeek(new Date(date.getFullYear(), date.getMonth() + 1, 0));
    }

    function fmt(date, options) {
      return new Intl.DateTimeFormat(locale, options).format(date);
    }

    function cap(value) {
      return value ? value.charAt(0).toUpperCase() + value.slice(1) : '';
    }

    function esc(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function minutes(time) {
      const [h, m] = String(time).split(':').map(Number);
      return (h * 60) + m;
    }

    function roleClass(role) {
      return `schedule-role-${role || 'outro'}`;
    }

    function roleDot(role) {
      return `schedule-role-dot-${role || 'outro'}`;
    }

    function rangeForView() {
      if (state.view === 'day') return { start: state.anchor, end: state.anchor };
      if (state.view === 'week') return { start: startOfWeek(state.anchor), end: endOfWeek(state.anchor) };
      if (state.view === 'month') return { start: monthGridStart(state.anchor), end: monthGridEnd(state.anchor) };
      return { start: state.anchor, end: addDays(state.anchor, 20) };
    }

    function rangeText(range) {
      if (state.view === 'day') {
        return cap(fmt(range.start, { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }));
      }
      if (state.view === 'month') {
        return cap(fmt(state.anchor, { month: 'long', year: 'numeric' }));
      }
      const sameMonth = range.start.getMonth() === range.end.getMonth() && range.start.getFullYear() === range.end.getFullYear();
      if (sameMonth) {
        return `${fmt(range.start, { day: 'numeric' })} - ${fmt(range.end, { day: 'numeric', month: 'long', year: 'numeric' })}`;
      }
      return `${fmt(range.start, { day: 'numeric', month: 'short' })} - ${fmt(range.end, { day: 'numeric', month: 'short', year: 'numeric' })}`;
    }

    function populateFilters() {
      const roles = Array.from(new Map(schedules.map((item) => [item.role, item.role_label])).entries());
      const branches = Array.from(new Map(schedules.map((item) => [String(item.branch_id), item.branch_name])).entries());
      roleFilter.insertAdjacentHTML('beforeend', roles.map(([value, label]) => `<option value="${esc(value)}">${esc(label)}</option>`).join(''));
      branchFilter.insertAdjacentHTML('beforeend', branches.map(([value, label]) => `<option value="${esc(value)}">${esc(label)}</option>`).join(''));
    }

    function filteredSchedules() {
      const query = state.query.trim().toLowerCase();
      return schedules.filter((item) => {
        if (state.role !== 'all' && item.role !== state.role) return false;
        if (state.branch !== 'all' && String(item.branch_id) !== state.branch) return false;
        if (state.status === 'active' && !item.is_active) return false;
        if (state.status === 'inactive' && item.is_active) return false;
        if (!query) return true;
        return [
          item.professional_name,
          item.username,
          item.email,
          item.role_label,
          item.branch_name,
          item.shift_name,
          item.doctor_badge,
        ].join(' ').toLowerCase().includes(query);
      });
    }

    function occurrences(items, range) {
      const rows = [];
      items.forEach((item) => {
        const validFrom = parseISO(item.valid_from);
        const validUntil = item.valid_until ? parseISO(item.valid_until) : null;
        const start = validFrom > range.start ? validFrom : range.start;
        const end = validUntil && validUntil < range.end ? validUntil : range.end;
        if (end < start) return;
        for (let cursor = toStart(start); cursor <= end; cursor = addDays(cursor, 1)) {
          if (mondayIndex(cursor) !== item.weekday) continue;
          rows.push({
            key: `${item.id}|${iso(cursor)}`,
            date: toStart(cursor),
            dateIso: iso(cursor),
            startMinutes: minutes(item.start_time),
            endMinutes: minutes(item.end_time),
            schedule: item,
          });
        }
      });
      return rows.sort((a, b) => a.dateIso.localeCompare(b.dateIso) || a.startMinutes - b.startMinutes || a.schedule.professional_name.localeCompare(b.schedule.professional_name));
    }

    function byDate(rows, date) {
      return rows.filter((row) => row.dateIso === iso(date));
    }

    function selectedOccurrence(rows) {
      return state.selectedOccurrenceKey ? rows.find((row) => row.key === state.selectedOccurrenceKey) || null : null;
    }

    function metric(name, value) {
      const node = root.querySelector(`[data-schedule-metric="${name}"]`);
      if (node) node.textContent = value;
    }

    function chips(row) {
      const item = row.schedule;
      const result = [
        `<span class="schedule-meta-pill"><i class="material-symbols-rounded" style="font-size:0.92rem;">apartment</i>${esc(item.branch_name)}</span>`,
        `<span class="schedule-meta-pill"><i class="material-symbols-rounded" style="font-size:0.92rem;">schedule</i>${esc(item.start_time)} - ${esc(item.end_time)}</span>`,
      ];
      if (item.accepts_appointments) {
        result.push(`<span class="schedule-meta-pill"><i class="material-symbols-rounded" style="font-size:0.92rem;">calendar_month</i>${item.appointments_today} ${esc(labels.todayShort)}</span>`);
      } else {
        result.push(`<span class="schedule-meta-pill"><i class="material-symbols-rounded" style="font-size:0.92rem;">lock_clock</i>${item.slot_minutes} min</span>`);
      }
      return result.join('');
    }

    function card(row, variant) {
      const cls = variant === 'week' ? 'schedule-week-card' : variant === 'day' ? 'schedule-day-card' : 'schedule-list-card';
      const item = row.schedule;
      return `
        <button type="button" class="${cls} ${roleClass(item.role)}" data-occurrence-key="${esc(row.key)}">
          <div class="schedule-card-topline">
            <div>
              <span class="schedule-event-time">${esc(item.start_time)} - ${esc(item.end_time)}</span>
              <div class="schedule-card-title">${esc(item.professional_name)}</div>
              <div class="schedule-card-subtitle">@${esc(item.username)}${item.doctor_badge ? ` · ${esc(item.doctor_badge)}` : ''}</div>
            </div>
            <span class="schedule-role-chip"><span class="schedule-legend-dot ${roleDot(item.role)}"></span>${esc(item.role_label)}</span>
          </div>
          <div class="schedule-card-meta-row">${chips(row)}</div>
        </button>
      `;
    }

    function renderMonth(range, rows) {
      const weekday = Array.from({ length: 7 }, (_, index) => `<div class="schedule-weekday-label">${esc(cap(fmt(addDays(startOfWeek(today), index), { weekday: 'short' })))}</div>`).join('');
      const parts = [];
      for (let cursor = range.start; cursor <= range.end; cursor = addDays(cursor, 1)) {
        const items = byDate(rows, cursor);
        const visible = items.slice(0, 3).map((row) => `
          <button type="button" class="schedule-month-event ${roleClass(row.schedule.role)}" data-occurrence-key="${esc(row.key)}">
            <span class="schedule-event-time">${esc(row.schedule.start_time)} - ${esc(row.schedule.end_time)}</span>
            <span class="schedule-event-title">${esc(row.schedule.professional_name)}</span>
            <span class="schedule-event-meta">${esc(row.schedule.role_label)}</span>
          </button>
        `).join('');
        parts.push(`
          <div class="schedule-month-cell ${cursor.getMonth() !== state.anchor.getMonth() ? 'is-outside' : ''} ${sameDate(cursor, today) ? 'is-today' : ''} ${sameDate(cursor, state.selectedDate) ? 'is-selected' : ''}" data-calendar-date="${iso(cursor)}">
            <div class="schedule-day-number"><span>${esc(fmt(cursor, { weekday: 'short' }))}</span><span class="schedule-day-badge">${cursor.getDate()}</span></div>
            <div class="schedule-month-events">
              ${visible || `<span class="schedule-event-meta">${esc(labels.noItemsDay)}</span>`}
              ${items.length > 3 ? `<span class="schedule-more-chip">+${items.length - 3} ${esc(labels.more)}</span>` : ''}
            </div>
          </div>
        `);
      }
      return `<div class="schedule-month-scroll"><div class="schedule-calendar-grid">${weekday}${parts.join('')}</div></div>`;
    }

    function renderWeek(range, rows) {
      const columns = Array.from({ length: 7 }, (_, index) => {
        const day = addDays(range.start, index);
        const items = byDate(rows, day);
        return `
          <div class="schedule-day-column ${sameDate(day, today) ? 'is-today' : ''} ${sameDate(day, state.selectedDate) ? 'is-selected' : ''}" data-calendar-date="${iso(day)}">
            <div class="schedule-day-column-header">
              <div><small>${esc(cap(fmt(day, { weekday: 'long' })))}</small><strong>${esc(fmt(day, { day: 'numeric', month: 'short' }))}</strong></div>
              <span class="schedule-day-count">${items.length}</span>
            </div>
            <div class="schedule-week-events">
              ${items.length ? items.map((row) => card(row, 'week')).join('') : `<div class="schedule-selected-field full"><small>${esc(labels.daySnapshot)}</small><span>${esc(labels.noItemsDay)}</span></div>`}
            </div>
          </div>
        `;
      }).join('');
      return `<div class="schedule-week-scroll"><div class="schedule-week-grid">${columns}</div></div>`;
    }

    function renderDay(rows) {
      const items = byDate(rows, state.selectedDate);
      return `
        <div class="schedule-day-shell">
          <div class="schedule-day-marker">
            <small>${esc(labels.dayView)}</small>
            <strong>${state.selectedDate.getDate()}</strong>
            <span>${esc(cap(fmt(state.selectedDate, { month: 'long', weekday: 'short' })))}</span>
          </div>
          <div class="schedule-day-events">
            ${items.length ? items.map((row) => card(row, 'day')).join('') : `<div class="schedule-empty">${esc(labels.noItemsDay)}</div>`}
          </div>
        </div>
      `;
    }

    function renderList(range, rows) {
      const groups = [];
      for (let cursor = range.start; cursor <= range.end; cursor = addDays(cursor, 1)) {
        const items = byDate(rows, cursor);
        if (!items.length) continue;
        groups.push(`
          <section class="schedule-list-group">
            <div class="schedule-list-heading">
              <h5>${esc(cap(fmt(cursor, { weekday: 'long', day: 'numeric', month: 'long' })))}</h5>
              <span>${items.length}</span>
            </div>
            <div class="schedule-list-items">${items.map((row) => card(row, 'list')).join('')}</div>
          </section>
        `);
      }
      return groups.length ? groups.join('') : `<div class="schedule-empty">${esc(labels.noItemsRange)}</div>`;
    }

    function renderSidebar(rows, items) {
      const dayRows = byDate(rows, state.selectedDate);
      const selected = selectedOccurrence(rows);
      if (!selected) {
        const bookingReady = new Set(dayRows.filter((row) => row.schedule.accepts_appointments).map((row) => row.schedule.id)).size;
        sidebar.innerHTML = `
          <section class="schedule-highlight-card">
            <small class="schedule-kicker" style="background: rgba(15,118,110,.08); color: var(--schedule-accent);">{% ui "Data seleccionada" "Selected date" %}</small>
            <h5>${esc(cap(fmt(state.selectedDate, { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })))}</h5>
            <p>{% ui "Clique num bloco do calendário para ver detalhes, atalhos e estado da integração com agenda." "Click a calendar block to see details, shortcuts, and booking integration status." %}</p>
          </section>
          <section class="schedule-sidebar-section">
            <h6>${esc(labels.daySnapshot)}</h6>
            <div class="schedule-mini-metrics">
              <div class="schedule-mini-metric"><small>${esc(labels.shifts)}</small><strong>${dayRows.length}</strong></div>
              <div class="schedule-mini-metric"><small>${esc(labels.professionals)}</small><strong>${new Set(dayRows.map((row) => row.schedule.user_id)).size}</strong></div>
              <div class="schedule-mini-metric"><small>${esc(labels.readyToSync)}</small><strong>${bookingReady}</strong></div>
              <div class="schedule-mini-metric"><small>${esc(labels.visibleRange)}</small><strong>${rows.length}</strong></div>
            </div>
          </section>
          <section class="schedule-sidebar-section">
            <h6>{% ui "Leitura rápida do dia" "Quick day reading" %}</h6>
            <div class="schedule-sidebar-list">
              ${dayRows.length ? dayRows.slice(0, 6).map((row) => `<div class="schedule-sidebar-list-item"><div><strong>${esc(row.schedule.professional_name)}</strong><small>${esc(row.schedule.role_label)} · ${esc(row.schedule.branch_name)}</small></div><span>${esc(row.schedule.start_time)} - ${esc(row.schedule.end_time)}</span></div>`).join('') : `<div class="schedule-selected-field full"><small>${esc(labels.daySnapshot)}</small><span>${esc(labels.noItemsDay)}</span></div>`}
            </div>
          </section>
        `;
        return;
      }

      const item = selected.schedule;
      const toggleLabel = item.is_active ? labels.deactivate : labels.activate;
      const toggleTitle = item.is_active ? '{% ui "Desactivar horário" "Deactivate schedule" %}' : '{% ui "Activar horário" "Activate schedule" %}';
      const toggleText = item.is_active ? '{% ui "O horário ficará guardado no histórico, mas sairá da operação activa." "The schedule will remain in history but leave the active operation." %}' : '{% ui "O horário voltará para a operação activa." "The schedule will return to the active operation." %}';
      sidebar.innerHTML = `
        <section class="schedule-highlight-card ${roleClass(item.role)}">
          <small class="schedule-kicker" style="background: rgba(15,118,110,.08); color: var(--schedule-accent);">${esc(labels.selectedShift)}</small>
          <h5>${esc(item.professional_name)}</h5>
          <p>${esc(item.role_label)} · ${esc(item.branch_name)} · ${esc(cap(fmt(selected.date, { weekday: 'long', day: 'numeric', month: 'long' })))}</p>
        </section>
        <section class="schedule-sidebar-section">
          <div class="schedule-selected-grid">
            <div class="schedule-selected-field"><small>${esc(labels.branch)}</small><strong>${esc(item.branch_name)}</strong></div>
            <div class="schedule-selected-field"><small>${esc(labels.shift)}</small><strong>${esc(item.shift_name || labels.baseShift)}</strong></div>
            <div class="schedule-selected-field"><small>{% ui "Janela de trabalho" "Work window" %}</small><strong>${esc(item.start_time)} - ${esc(item.end_time)}</strong></div>
            <div class="schedule-selected-field"><small>${esc(labels.pause)}</small><strong>${esc(item.break_label || labels.noBreak)}</strong></div>
            <div class="schedule-selected-field"><small>${esc(labels.duration)}</small><strong>${item.slot_minutes} min</strong></div>
            <div class="schedule-selected-field"><small>${esc(labels.bookingMode)}</small><strong>${esc(item.accepts_appointments ? labels.bookingReady : labels.independent)}</strong></div>
            <div class="schedule-selected-field"><small>${esc(labels.nextOccurrence)}</small><strong>${esc(item.next_occurrence_date ? fmt(parseISO(item.next_occurrence_date), { day: 'numeric', month: 'short', year: 'numeric' }) : labels.noNext)}</strong></div>
            <div class="schedule-selected-field"><small>${esc(labels.validity)}</small><strong>${esc(fmt(parseISO(item.valid_from), { day: 'numeric', month: 'short', year: 'numeric' }))} → ${esc(item.valid_until ? fmt(parseISO(item.valid_until), { day: 'numeric', month: 'short', year: 'numeric' }) : '{% ui "sem data final" "no end date" %}')}</strong></div>
            <div class="schedule-selected-field full"><small>{% ui "Sincronização clínica" "Clinical synchronization" %}</small><span>${item.accepts_appointments ? `${item.appointments_today} ${esc(labels.todayShort)} · ${item.future_appointments} ${esc(labels.futureAppointments)}` : esc(labels.independent)}${item.linked_doctor ? ` · ${esc(item.doctor_badge || '')}` : ` · ${esc(labels.noDoctor)}`}</span></div>
          </div>
          <div class="schedule-sidebar-actions">
            <a href="${esc(item.detail_url)}" data-modal-url="${esc(item.detail_url)}" data-modal-size="modal-xl" class="btn btn-outline-dark mb-0"><i class="material-symbols-rounded text-sm me-1">visibility</i>${esc(labels.openDetails)}</a>
            <a href="${esc(item.edit_url)}" data-modal-url="${esc(item.edit_url)}" data-modal-size="modal-xl" class="btn bg-gradient-dark mb-0"><i class="material-symbols-rounded text-sm me-1">edit</i>${esc(labels.edit)}</a>
          </div>
          <div class="schedule-sidebar-actions">
            <a href="#" data-confirm-action data-action-url="${esc(item.toggle_url)}" data-confirm-title="${esc(toggleTitle)}" data-confirm-text="${esc(toggleText)}" data-confirm-button="${esc(toggleLabel)}" data-confirm-icon="${item.is_active ? 'warning' : 'question'}" class="btn ${item.is_active ? 'btn-outline-warning' : 'btn-outline-success'} mb-0"><i class="material-symbols-rounded text-sm me-1">${item.is_active ? 'event_busy' : 'event_available'}</i>${esc(toggleLabel)}</a>
          </div>
          <div class="schedule-selected-note">${esc(item.notes || labels.noNotes)}</div>
        </section>
        <section class="schedule-sidebar-section">
          <h6>{% ui "Outros turnos nesta data" "Other shifts on this date" %}</h6>
          <div class="schedule-sidebar-list">
            ${dayRows.filter((row) => row.key !== selected.key).slice(0, 5).map((row) => `<div class="schedule-sidebar-list-item"><div><strong>${esc(row.schedule.professional_name)}</strong><small>${esc(row.schedule.role_label)} · ${esc(row.schedule.branch_name)}</small></div><span>${esc(row.schedule.start_time)}</span></div>`).join('') || `<div class="schedule-selected-field full"><small>{% ui "Data actual" "Current date" %}</small><span>${esc(labels.onlyVisible)}</span></div>`}
          </div>
        </section>
      `;
      if (window.clinicShell && typeof window.clinicShell.init === 'function') window.clinicShell.init(sidebar);
    }

    function updateControls(items, rows, range) {
      rangeLabel.textContent = rangeText(range);
      roleFilter.value = state.role;
      branchFilter.value = state.branch;
      searchInput.value = state.query;
      root.querySelectorAll('[data-calendar-view]').forEach((button) => button.classList.toggle('is-active', button.dataset.calendarView === state.view));
      root.querySelectorAll('[data-calendar-status]').forEach((button) => button.classList.toggle('is-active', button.dataset.calendarStatus === state.status));
      metric('visibleBlocks', rows.length);
      metric('visibleProfessionals', new Set(rows.map((row) => row.schedule.user_id)).size);
      metric('onDuty', new Set(byDate(rows, state.selectedDate).map((row) => row.schedule.user_id)).size);
      metric('bookingReady', new Set(items.filter((item) => item.accepts_appointments && item.is_active).map((item) => item.id)).size);
    }

    function syncUrl() {
      const next = new URLSearchParams(window.location.search);
      next.set('view', state.view);
      next.set('date', iso(state.anchor));
      history.replaceState({}, '', `${window.location.pathname}?${next.toString()}`);
    }

    function render() {
      const items = filteredSchedules();
      const range = rangeForView();
      const rows = occurrences(items, range);
      if (!selectedOccurrence(rows)) {
        const sameDay = byDate(rows, state.selectedDate);
        state.selectedOccurrenceKey = sameDay[0] ? sameDay[0].key : null;
        if (!sameDay.length && rows[0]) {
          state.selectedDate = rows[0].date;
          state.selectedOccurrenceKey = rows[0].key;
        }
      }
      canvas.innerHTML = !rows.length
        ? `<div class="schedule-empty">${esc(labels.noItemsRange)}</div>`
        : state.view === 'month'
          ? renderMonth(range, rows)
          : state.view === 'week'
            ? renderWeek(range, rows)
            : state.view === 'day'
              ? renderDay(rows)
              : renderList(range, rows);
      updateControls(items, rows, range);
      renderSidebar(rows, items);
      syncUrl();
      if (window.clinicShell && typeof window.clinicShell.init === 'function') window.clinicShell.init(canvas);
    }

    function shiftRange(direction) {
      if (state.view === 'day') state.anchor = addDays(state.anchor, direction);
      else if (state.view === 'week') state.anchor = addDays(state.anchor, direction * 7);
      else if (state.view === 'month') state.anchor = new Date(state.anchor.getFullYear(), state.anchor.getMonth() + direction, 1);
      else state.anchor = addDays(state.anchor, direction * 21);
      state.selectedDate = state.view === 'week' ? startOfWeek(state.anchor) : toStart(state.anchor);
    }

    root.addEventListener('click', (event) => {
      const viewButton = event.target.closest('[data-calendar-view]');
      if (viewButton) {
        state.view = normalizeView(viewButton.dataset.calendarView);
        state.selectedDate = state.view === 'week' ? startOfWeek(state.anchor) : toStart(state.anchor);
        render();
        return;
      }

      const statusButton = event.target.closest('[data-calendar-status]');
      if (statusButton) {
        state.status = statusButton.dataset.calendarStatus;
        render();
        return;
      }

      const navButton = event.target.closest('[data-calendar-nav]');
      if (navButton) {
        if (navButton.dataset.calendarNav === 'today') {
          state.anchor = today;
          state.selectedDate = today;
        } else {
          shiftRange(navButton.dataset.calendarNav === 'next' ? 1 : -1);
        }
        render();
        return;
      }

      const occurrenceTrigger = event.target.closest('[data-occurrence-key]');
      if (occurrenceTrigger) {
        const [, dateValue] = occurrenceTrigger.dataset.occurrenceKey.split('|');
        state.selectedOccurrenceKey = occurrenceTrigger.dataset.occurrenceKey;
        state.selectedDate = parseISO(dateValue) || state.selectedDate;
        render();
        return;
      }

      const dateTrigger = event.target.closest('[data-calendar-date]');
      if (dateTrigger) {
        const next = parseISO(dateTrigger.dataset.calendarDate);
        if (next) {
          state.selectedDate = next;
          if (state.view === 'day') state.anchor = next;
          render();
        }
      }
    });

    searchInput.addEventListener('input', () => { state.query = searchInput.value; render(); });
    roleFilter.addEventListener('change', () => { state.role = roleFilter.value; render(); });
    branchFilter.addEventListener('change', () => { state.branch = branchFilter.value; render(); });
    if (todayHero) todayHero.addEventListener('click', () => { state.anchor = today; state.selectedDate = today; render(); });

    populateFilters();
    render();
  })();
</script>

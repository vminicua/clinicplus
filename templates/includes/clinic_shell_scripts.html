{% load ui_extras %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.print.min.js"></script>
<script>
  window.CLINIC_FLASH_MESSAGES = [
    {% for message in messages %}
      {
        level: "{{ message.tags|default:'info'|escapejs }}",
        text: "{{ message|escapejs }}"
      },
    {% endfor %}
  ];
</script>
<script>
  (function() {
    const modalElement = document.getElementById('clinicActionModal');
    const modalInstance = modalElement && typeof bootstrap !== 'undefined'
      ? new bootstrap.Modal(modalElement)
      : null;

    function mapLevel(level) {
      if (level === 'error' || level === 'danger') {
        return 'error';
      }
      if (level === 'warning') {
        return 'warning';
      }
      if (level === 'success') {
        return 'success';
      }
      return 'info';
    }

    function getCsrfToken() {
      const cookie = document.cookie
        .split('; ')
        .find((row) => row.startsWith('csrftoken='));
      return cookie ? decodeURIComponent(cookie.split('=')[1]) : '';
    }

    function showProcessing(title, text) {
      if (!window.Swal) {
        return;
      }
      Swal.fire({
        title: title || '{% ui "Processando..." "Processing..." %}',
        text: text || '{% ui "Aguarde um momento." "Please wait a moment." %}',
        allowOutsideClick: false,
        allowEscapeKey: false,
        didOpen: () => {
          Swal.showLoading();
        },
      });
    }

    function showFeedback(icon, title, text) {
      if (!window.Swal) {
        return;
      }
      Swal.fire({
        icon: icon,
        title: title,
        text: text,
        timer: icon === 'success' ? 1800 : undefined,
        showConfirmButton: icon !== 'success',
      });
    }

    function showFlashMessages() {
      if (!window.Swal || !Array.isArray(window.CLINIC_FLASH_MESSAGES)) {
        return;
      }
      window.CLINIC_FLASH_MESSAGES.forEach((message, index) => {
        setTimeout(() => {
          Swal.fire({
            toast: true,
            position: 'top-end',
            icon: mapLevel(message.level),
            title: message.text,
            showConfirmButton: false,
            timer: 3500,
            timerProgressBar: true,
          });
        }, index * 250);
      });
    }

    function validateWizardStep(panel) {
      const fields = panel.querySelectorAll('input, select, textarea');
      for (const field of fields) {
        if (field.disabled || field.type === 'hidden') {
          continue;
        }
        if (!field.reportValidity()) {
          return false;
        }
      }
      return true;
    }

    function initWizards(root) {
      root.querySelectorAll('.js-wizard').forEach((wizard) => {
        if (wizard.dataset.ready === '1') {
          return;
        }
        wizard.dataset.ready = '1';

        const panels = Array.from(wizard.querySelectorAll('[data-step-panel]'));
        const indicators = Array.from(wizard.querySelectorAll('[data-step-target]'));
        const errorIndex = panels.findIndex((panel) => panel.querySelector('.invalid-feedback.d-block, .alert-danger'));
        let currentIndex = errorIndex >= 0 ? errorIndex : 0;

        function syncStep() {
          panels.forEach((panel, index) => {
            panel.classList.toggle('d-none', index !== currentIndex);
          });

          indicators.forEach((indicator, index) => {
            indicator.classList.toggle('active', index === currentIndex);
            indicator.classList.toggle('completed', index < currentIndex);
          });

          wizard.querySelectorAll('[data-wizard-prev]').forEach((button) => {
            button.disabled = currentIndex === 0;
          });

          wizard.querySelectorAll('[data-wizard-next]').forEach((button) => {
            button.classList.toggle('d-none', currentIndex === panels.length - 1);
          });

          wizard.querySelectorAll('[data-wizard-submit]').forEach((button) => {
            button.classList.toggle('d-none', currentIndex !== panels.length - 1);
          });
        }

        wizard.addEventListener('click', (event) => {
          const nextButton = event.target.closest('[data-wizard-next]');
          if (nextButton) {
            event.preventDefault();
            if (validateWizardStep(panels[currentIndex])) {
              currentIndex = Math.min(currentIndex + 1, panels.length - 1);
              syncStep();
            }
            return;
          }

          const prevButton = event.target.closest('[data-wizard-prev]');
          if (prevButton) {
            event.preventDefault();
            currentIndex = Math.max(currentIndex - 1, 0);
            syncStep();
          }
        });

        syncStep();
      });
    }

    function initScheduleBuilders(root) {
      root.querySelectorAll('[data-schedule-builder]').forEach((builder) => {
        if (builder.dataset.ready === '1') {
          return;
        }
        builder.dataset.ready = '1';

        const weekdayInputs = Array.from(builder.querySelectorAll('[data-weekday-picker] input[type="checkbox"]'));
        const presetButtons = Array.from(builder.querySelectorAll('[data-weekday-preset]'));
        const customizeInput = builder.querySelector('input[name="customize_day_hours"]');
        const dayCards = Array.from(builder.querySelectorAll('[data-day-config-card]'));

        function syncWeekdayChoices() {
          weekdayInputs.forEach((input) => {
            const choice = input.closest('.clinic-choice-item');
            if (!choice) {
              return;
            }
            choice.classList.toggle('is-selected', input.checked);
          });
        }

        function selectedWeekdays() {
          return new Set(weekdayInputs.filter((input) => input.checked).map((input) => input.value));
        }

        function syncDayCards() {
          const selected = selectedWeekdays();
          const customizeEnabled = !customizeInput || customizeInput.checked;

          dayCards.forEach((card) => {
            const isSelected = selected.has(card.dataset.dayValue);
            const hasErrors = !!card.querySelector('.invalid-feedback.d-block');
            const fields = card.querySelector('[data-day-config-fields]');
            const idle = card.querySelector('[data-day-config-idle]');
            const showFields = (customizeEnabled && isSelected) || hasErrors;

            card.classList.toggle('border-dark', isSelected || hasErrors);
            card.classList.toggle('shadow-sm', isSelected || hasErrors);

            if (fields) {
              fields.classList.toggle('d-none', !showFields);
            }
            if (idle) {
              idle.classList.toggle('d-none', showFields);
            }
          });
        }

        presetButtons.forEach((button) => {
          button.addEventListener('click', (event) => {
            event.preventDefault();
            weekdayInputs.forEach((input) => {
              if (button.dataset.weekdayPreset === 'business') {
                input.checked = ['0', '1', '2', '3', '4'].includes(input.value);
              } else if (button.dataset.weekdayPreset === 'all') {
                input.checked = true;
              } else if (button.dataset.weekdayPreset === 'clear') {
                input.checked = false;
              }
            });
            syncWeekdayChoices();
            syncDayCards();
          });
        });

        weekdayInputs.forEach((input) => {
          input.addEventListener('change', () => {
            syncWeekdayChoices();
            syncDayCards();
          });
        });

        if (customizeInput) {
          customizeInput.addEventListener('change', syncDayCards);
        }

        syncWeekdayChoices();
        syncDayCards();
      });
    }

    function initPermissionTables(root) {
      root.querySelectorAll('[data-permission-toggle]').forEach((toggle) => {
        if (toggle.dataset.ready === '1') {
          return;
        }
        toggle.dataset.ready = '1';
        toggle.addEventListener('change', () => {
          const group = toggle.closest('[data-permission-group]');
          if (!group) {
            return;
          }
          group.querySelectorAll('input[type="checkbox"][name="permissions"]').forEach((checkbox) => {
            checkbox.checked = toggle.checked;
          });
        });
      });
    }

    function initModalTriggers(root) {
      root.querySelectorAll('[data-modal-url]').forEach((trigger) => {
        if (trigger.dataset.ready === '1') {
          return;
        }
        trigger.dataset.ready = '1';
        trigger.addEventListener('click', async (event) => {
          event.preventDefault();

          if (!modalElement || !modalInstance) {
            window.location.href = trigger.getAttribute('href') || trigger.dataset.modalUrl;
            return;
          }

          const url = trigger.dataset.modalUrl;
          const modalSize = trigger.dataset.modalSize || 'modal-lg';

          try {
            showProcessing('{% ui "A carregar..." "Loading..." %}', '{% ui "Estamos a preparar o formulário." "We are preparing the form." %}');
            const separator = url.includes('?') ? '&' : '?';
            const response = await fetch(`${url}${separator}modal=1`, {
              headers: {
                'X-Requested-With': 'XMLHttpRequest',
              },
            });
            const html = await response.text();
            modalElement.querySelector('.modal-dialog').className = `modal-dialog modal-dialog-centered modal-dialog-scrollable ${modalSize}`;
            modalElement.querySelector('.modal-content').innerHTML = html;
            modalInstance.show();
            Swal.close();
            initClinicShell(modalElement);
          } catch (error) {
            console.error(error);
            showFeedback('error', '{% ui "Erro" "Error" %}', '{% ui "Não foi possível carregar este formulário." "We could not load this form." %}');
          }
        });
      });
    }

    async function submitModalForm(form) {
      try {
        showProcessing(
          form.dataset.processingTitle || '{% ui "Processando..." "Processing..." %}',
          form.dataset.processingText || '{% ui "Aguarde um momento." "Please wait a moment." %}'
        );

        const formData = new FormData(form);
        if (!formData.has('modal')) {
          formData.append('modal', '1');
        }

        const response = await fetch(form.action, {
          method: (form.method || 'post').toUpperCase(),
          body: formData,
          headers: {
            'X-Requested-With': 'XMLHttpRequest',
            'X-CSRFToken': getCsrfToken(),
          },
        });

        const contentType = response.headers.get('content-type') || '';

        if (contentType.includes('application/json')) {
          const data = await response.json();
          if (modalInstance) {
            modalInstance.hide();
          }
          showFeedback('success', '{% ui "Sucesso" "Success" %}', data.message || '{% ui "Operação concluída com sucesso." "Operation completed successfully." %}');
          if (data.redirect_url) {
            setTimeout(() => {
              window.location.href = data.redirect_url;
            }, 900);
            return;
          }
          if (data.reload !== false) {
            setTimeout(() => {
              window.location.reload();
            }, 900);
          }
          return;
        }

        const html = await response.text();
        modalElement.querySelector('.modal-content').innerHTML = html;
        Swal.close();
        initClinicShell(modalElement);
        if (!response.ok) {
          showFeedback('error', '{% ui "Dados por corrigir" "Data needs attention" %}', '{% ui "Revise os campos destacados e tente novamente." "Review the highlighted fields and try again." %}');
        }
      } catch (error) {
        console.error(error);
        showFeedback('error', '{% ui "Erro" "Error" %}', '{% ui "O processamento falhou. Tente novamente." "Processing failed. Please try again." %}');
      }
    }

    function initFormSubmits(root) {
      root.querySelectorAll('form[data-swal-submit]').forEach((form) => {
        if (form.dataset.ready === '1') {
          return;
        }
        form.dataset.ready = '1';

        form.addEventListener('submit', (event) => {
          if (form.classList.contains('js-modal-form')) {
            event.preventDefault();
            submitModalForm(form);
            return;
          }

          showProcessing(
            form.dataset.processingTitle || '{% ui "Processando..." "Processing..." %}',
            form.dataset.processingText || '{% ui "Aguarde um momento." "Please wait a moment." %}'
          );
        });
      });
    }

    function initSearchableSelects(root) {
      if (!window.jQuery || !jQuery.fn.select2) {
        return;
      }

      root.querySelectorAll('select[data-searchable-select="1"]').forEach((selectElement) => {
        const $select = jQuery(selectElement);
        if ($select.hasClass('select2-hidden-accessible')) {
          return;
        }

        const modalParent = selectElement.closest('.modal');
        const isMultiple = selectElement.multiple;
        const isRequired = selectElement.required;

        $select.select2({
          theme: 'bootstrap-5',
          width: '100%',
          dropdownAutoWidth: false,
          closeOnSelect: !isMultiple,
          dropdownParent: modalParent ? jQuery(modalParent) : jQuery(document.body),
          placeholder: selectElement.dataset.placeholder || '',
          allowClear: !isRequired && !isMultiple,
          language: {
            noResults: function() {
              return '{% ui "Sem resultados" "No results" %}';
            },
            searching: function() {
              return '{% ui "A pesquisar..." "Searching..." %}';
            },
          },
        });
      });
    }

    function initDataTables(root) {
      if (!window.jQuery || !jQuery.fn.DataTable) {
        return;
      }

      root.querySelectorAll('.js-clinic-datatable').forEach((tableElement) => {
        if (tableElement.dataset.datatableReady === '1') {
          return;
        }
        tableElement.dataset.datatableReady = '1';

        const $table = jQuery(tableElement);
        const defaultLength = Number(tableElement.dataset.pageLength || 10);
        const exportTitle = tableElement.dataset.exportTitle || document.title || 'Clinic Plus';

        const instance = $table.DataTable({
          pageLength: defaultLength,
          lengthChange: true,
          lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, '{% ui "Todos" "All" %}']],
          ordering: true,
          responsive: false,
          autoWidth: false,
          pagingType: 'simple_numbers',
          info: true,
          language: {
            search: '{% ui "Pesquisar:" "Search:" %}',
            lengthMenu: '{% ui "Mostrar _MENU_ registos" "Show _MENU_ records" %}',
            info: '{% ui "A mostrar _START_ até _END_ de _TOTAL_ registos" "Showing _START_ to _END_ of _TOTAL_ records" %}',
            infoEmpty: '{% ui "Sem registos para mostrar" "No records to show" %}',
            infoFiltered: '{% ui "(filtrado de _MAX_ registos)" "(filtered from _MAX_ records)" %}',
            zeroRecords: '{% ui "Nenhum registo encontrado" "No records found" %}',
            paginate: {
              first: '<<',
              previous: '<',
              next: '>',
              last: '>>'
            }
          },
          dom:
            "<'row align-items-center mb-3'<'col-lg-8 d-flex flex-wrap align-items-center gap-2' lB><'col-lg-4 text-lg-end'f>>" +
            "t" +
            "<'row align-items-center mt-3'<'col-md-5'i><'col-md-7 d-flex justify-content-md-end'p>>",
          buttons: [
            {
              extend: 'copyHtml5',
              text: '{% ui "Copiar" "Copy" %}',
              className: 'btn btn-outline-dark btn-sm',
              exportOptions: {
                columns: ':not(.not-export)'
              }
            },
            {
              extend: 'csvHtml5',
              text: 'CSV',
              title: exportTitle,
              className: 'btn btn-outline-dark btn-sm',
              exportOptions: {
                columns: ':not(.not-export)'
              }
            },
            {
              extend: 'excelHtml5',
              text: 'Excel',
              title: exportTitle,
              className: 'btn btn-outline-dark btn-sm',
              exportOptions: {
                columns: ':not(.not-export)'
              }
            },
            {
              extend: 'print',
              text: '{% ui "Imprimir" "Print" %}',
              title: exportTitle,
              className: 'btn btn-outline-dark btn-sm',
              exportOptions: {
                columns: ':not(.not-export)'
              }
            }
          ],
          initComplete: function() {
            const wrapper = tableElement.closest('.dataTables_wrapper');
            if (wrapper) {
              wrapper.classList.add('clinic-datatable-ready');
            }
          }
        });

        const tableId = tableElement.id;
        root.querySelectorAll(`[data-table-pill="${tableId}"]`).forEach((pill) => {
          if (pill.dataset.ready === '1') {
            return;
          }
          pill.dataset.ready = '1';
          pill.addEventListener('click', (event) => {
            event.preventDefault();
            const value = pill.dataset.value || '';
            const column = Number(pill.dataset.column || 0);
            root.querySelectorAll(`[data-table-pill="${tableId}"]`).forEach((otherPill) => {
              otherPill.classList.remove('active');
            });
            pill.classList.add('active');

            if (!value) {
              instance.column(column).search('').draw();
              return;
            }
            instance.column(column).search(`^${value}$`, true, false).draw();
          });
        });
      });
    }

    async function submitConfirmedAction(trigger) {
      const response = await fetch(trigger.dataset.actionUrl, {
        method: 'POST',
        headers: {
          'X-Requested-With': 'XMLHttpRequest',
          'X-CSRFToken': getCsrfToken(),
        },
      });

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.message || '{% ui "O processamento falhou." "Processing failed." %}');
      }

      showFeedback('success', '{% ui "Sucesso" "Success" %}', data.message || '{% ui "Operação concluída com sucesso." "Operation completed successfully." %}');
      setTimeout(() => {
        if (data.redirect_url) {
          window.location.href = data.redirect_url;
          return;
        }
        window.location.reload();
      }, 900);
    }

    function initConfirmActions(root) {
      root.querySelectorAll('[data-confirm-action]').forEach((trigger) => {
        if (trigger.dataset.ready === '1') {
          return;
        }
        trigger.dataset.ready = '1';
        trigger.addEventListener('click', async (event) => {
          event.preventDefault();

          const result = await Swal.fire({
            icon: trigger.dataset.confirmIcon || 'warning',
            title: trigger.dataset.confirmTitle || '{% ui "Confirmar" "Confirm" %}',
            text: trigger.dataset.confirmText || '{% ui "Deseja continuar?" "Do you want to continue?" %}',
            showCancelButton: true,
            confirmButtonText: trigger.dataset.confirmButton || '{% ui "Confirmar" "Confirm" %}',
            cancelButtonText: '{% ui "Cancelar" "Cancel" %}',
          });

          if (!result.isConfirmed) {
            return;
          }

          try {
            showProcessing('{% ui "Processando..." "Processing..." %}', '{% ui "Estamos a actualizar o estado." "We are updating the status." %}');
            await submitConfirmedAction(trigger);
          } catch (error) {
            console.error(error);
            showFeedback('error', '{% ui "Erro" "Error" %}', error.message || '{% ui "A operação falhou." "The operation failed." %}');
          }
        });
      });
    }

    function initClinicShell(root) {
      initModalTriggers(root);
      initFormSubmits(root);
      initSearchableSelects(root);
      initWizards(root);
      initScheduleBuilders(root);
      initPermissionTables(root);
      initDataTables(root);
      initConfirmActions(root);
    }

    window.clinicShell = {
      init: initClinicShell,
      showProcessing,
      showFeedback,
    };

    document.addEventListener('DOMContentLoaded', () => {
      initClinicShell(document);
      showFlashMessages();
    });
  })();
</script>

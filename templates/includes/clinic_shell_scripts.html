<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.print.min.js"></script>
<script>
  window.CLINIC_FLASH_MESSAGES = [
    {% for message in messages %}
      {
        level: "{{ message.tags|default:'info'|escapejs }}",
        text: "{{ message|escapejs }}"
      },
    {% endfor %}
  ];
</script>
<script>
  (function() {
    const modalElement = document.getElementById('clinicActionModal');
    const modalInstance = modalElement && typeof bootstrap !== 'undefined'
      ? new bootstrap.Modal(modalElement)
      : null;

    function mapLevel(level) {
      if (level === 'error' || level === 'danger') {
        return 'error';
      }
      if (level === 'warning') {
        return 'warning';
      }
      if (level === 'success') {
        return 'success';
      }
      return 'info';
    }

    function getCsrfToken() {
      const cookie = document.cookie
        .split('; ')
        .find((row) => row.startsWith('csrftoken='));
      return cookie ? decodeURIComponent(cookie.split('=')[1]) : '';
    }

    function showProcessing(title, text) {
      if (!window.Swal) {
        return;
      }
      Swal.fire({
        title: title || 'Processando...',
        text: text || 'Aguarde um momento.',
        allowOutsideClick: false,
        allowEscapeKey: false,
        didOpen: () => {
          Swal.showLoading();
        },
      });
    }

    function showFeedback(icon, title, text) {
      if (!window.Swal) {
        return;
      }
      Swal.fire({
        icon: icon,
        title: title,
        text: text,
        timer: icon === 'success' ? 1800 : undefined,
        showConfirmButton: icon !== 'success',
      });
    }

    function showFlashMessages() {
      if (!window.Swal || !Array.isArray(window.CLINIC_FLASH_MESSAGES)) {
        return;
      }
      window.CLINIC_FLASH_MESSAGES.forEach((message, index) => {
        setTimeout(() => {
          Swal.fire({
            toast: true,
            position: 'top-end',
            icon: mapLevel(message.level),
            title: message.text,
            showConfirmButton: false,
            timer: 3500,
            timerProgressBar: true,
          });
        }, index * 250);
      });
    }

    function validateWizardStep(panel) {
      const fields = panel.querySelectorAll('input, select, textarea');
      for (const field of fields) {
        if (field.disabled || field.type === 'hidden') {
          continue;
        }
        if (!field.reportValidity()) {
          return false;
        }
      }
      return true;
    }

    function initWizards(root) {
      root.querySelectorAll('.js-wizard').forEach((wizard) => {
        if (wizard.dataset.ready === '1') {
          return;
        }
        wizard.dataset.ready = '1';

        const panels = Array.from(wizard.querySelectorAll('[data-step-panel]'));
        const indicators = Array.from(wizard.querySelectorAll('[data-step-target]'));
        let currentIndex = 0;

        function syncStep() {
          panels.forEach((panel, index) => {
            panel.classList.toggle('d-none', index !== currentIndex);
          });

          indicators.forEach((indicator, index) => {
            indicator.classList.toggle('active', index === currentIndex);
            indicator.classList.toggle('completed', index < currentIndex);
          });

          wizard.querySelectorAll('[data-wizard-prev]').forEach((button) => {
            button.disabled = currentIndex === 0;
          });

          wizard.querySelectorAll('[data-wizard-next]').forEach((button) => {
            button.classList.toggle('d-none', currentIndex === panels.length - 1);
          });

          wizard.querySelectorAll('[data-wizard-submit]').forEach((button) => {
            button.classList.toggle('d-none', currentIndex !== panels.length - 1);
          });
        }

        wizard.addEventListener('click', (event) => {
          const nextButton = event.target.closest('[data-wizard-next]');
          if (nextButton) {
            event.preventDefault();
            if (validateWizardStep(panels[currentIndex])) {
              currentIndex = Math.min(currentIndex + 1, panels.length - 1);
              syncStep();
            }
            return;
          }

          const prevButton = event.target.closest('[data-wizard-prev]');
          if (prevButton) {
            event.preventDefault();
            currentIndex = Math.max(currentIndex - 1, 0);
            syncStep();
          }
        });

        syncStep();
      });
    }

    function initPermissionTables(root) {
      root.querySelectorAll('[data-permission-toggle]').forEach((toggle) => {
        if (toggle.dataset.ready === '1') {
          return;
        }
        toggle.dataset.ready = '1';
        toggle.addEventListener('change', () => {
          const group = toggle.closest('[data-permission-group]');
          if (!group) {
            return;
          }
          group.querySelectorAll('input[type="checkbox"][name="permissions"]').forEach((checkbox) => {
            checkbox.checked = toggle.checked;
          });
        });
      });
    }

    function initModalTriggers(root) {
      root.querySelectorAll('[data-modal-url]').forEach((trigger) => {
        if (trigger.dataset.ready === '1') {
          return;
        }
        trigger.dataset.ready = '1';
        trigger.addEventListener('click', async (event) => {
          event.preventDefault();

          if (!modalElement || !modalInstance) {
            window.location.href = trigger.getAttribute('href') || trigger.dataset.modalUrl;
            return;
          }

          const url = trigger.dataset.modalUrl;
          const modalSize = trigger.dataset.modalSize || 'modal-lg';

          try {
            showProcessing('A carregar...', 'Estamos a preparar o formulário.');
            const separator = url.includes('?') ? '&' : '?';
            const response = await fetch(`${url}${separator}modal=1`, {
              headers: {
                'X-Requested-With': 'XMLHttpRequest',
              },
            });
            const html = await response.text();
            modalElement.querySelector('.modal-dialog').className = `modal-dialog modal-dialog-centered modal-dialog-scrollable ${modalSize}`;
            modalElement.querySelector('.modal-content').innerHTML = html;
            modalInstance.show();
            Swal.close();
            initClinicShell(modalElement);
          } catch (error) {
            console.error(error);
            showFeedback('error', 'Erro', 'Não foi possível carregar este formulário.');
          }
        });
      });
    }

    async function submitModalForm(form) {
      try {
        showProcessing(
          form.dataset.processingTitle || 'Processando...',
          form.dataset.processingText || 'Aguarde um momento.'
        );

        const formData = new FormData(form);
        if (!formData.has('modal')) {
          formData.append('modal', '1');
        }

        const response = await fetch(form.action, {
          method: (form.method || 'post').toUpperCase(),
          body: formData,
          headers: {
            'X-Requested-With': 'XMLHttpRequest',
            'X-CSRFToken': getCsrfToken(),
          },
        });

        const contentType = response.headers.get('content-type') || '';

        if (contentType.includes('application/json')) {
          const data = await response.json();
          if (modalInstance) {
            modalInstance.hide();
          }
          showFeedback('success', 'Sucesso', data.message || 'Operação concluída com sucesso.');
          if (data.redirect_url) {
            setTimeout(() => {
              window.location.href = data.redirect_url;
            }, 900);
            return;
          }
          if (data.reload !== false) {
            setTimeout(() => {
              window.location.reload();
            }, 900);
          }
          return;
        }

        const html = await response.text();
        modalElement.querySelector('.modal-content').innerHTML = html;
        Swal.close();
        initClinicShell(modalElement);
        if (!response.ok) {
          showFeedback('error', 'Dados por corrigir', 'Revise os campos destacados e tente novamente.');
        }
      } catch (error) {
        console.error(error);
        showFeedback('error', 'Erro', 'O processamento falhou. Tente novamente.');
      }
    }

    function initFormSubmits(root) {
      root.querySelectorAll('form[data-swal-submit]').forEach((form) => {
        if (form.dataset.ready === '1') {
          return;
        }
        form.dataset.ready = '1';

        form.addEventListener('submit', (event) => {
          if (form.classList.contains('js-modal-form')) {
            event.preventDefault();
            submitModalForm(form);
            return;
          }

          showProcessing(
            form.dataset.processingTitle || 'Processando...',
            form.dataset.processingText || 'Aguarde um momento.'
          );
        });
      });
    }

    function initDataTables(root) {
      if (!window.jQuery || !jQuery.fn.DataTable) {
        return;
      }

      root.querySelectorAll('.js-clinic-datatable').forEach((tableElement) => {
        if (tableElement.dataset.datatableReady === '1') {
          return;
        }
        tableElement.dataset.datatableReady = '1';

        const $table = jQuery(tableElement);
        const defaultLength = Number(tableElement.dataset.pageLength || 10);
        const exportTitle = tableElement.dataset.exportTitle || document.title || 'Clinic Plus';

        const instance = $table.DataTable({
          pageLength: defaultLength,
          lengthChange: true,
          lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, 'Todos']],
          ordering: true,
          responsive: false,
          autoWidth: false,
          pagingType: 'simple_numbers',
          info: true,
          language: {
            search: 'Pesquisar:',
            lengthMenu: 'Mostrar _MENU_ registos',
            info: 'A mostrar _START_ até _END_ de _TOTAL_ registos',
            infoEmpty: 'Sem registos para mostrar',
            infoFiltered: '(filtrado de _MAX_ registos)',
            zeroRecords: 'Nenhum registo encontrado',
            paginate: {
              first: '<<',
              previous: '<',
              next: '>',
              last: '>>'
            }
          },
          dom:
            "<'row align-items-center mb-3'<'col-lg-8 d-flex flex-wrap align-items-center gap-2' lB><'col-lg-4 text-lg-end'f>>" +
            "t" +
            "<'row align-items-center mt-3'<'col-md-5'i><'col-md-7 d-flex justify-content-md-end'p>>",
          buttons: [
            {
              extend: 'copyHtml5',
              text: 'Copiar',
              className: 'btn btn-outline-dark btn-sm',
              exportOptions: {
                columns: ':not(.not-export)'
              }
            },
            {
              extend: 'csvHtml5',
              text: 'CSV',
              title: exportTitle,
              className: 'btn btn-outline-dark btn-sm',
              exportOptions: {
                columns: ':not(.not-export)'
              }
            },
            {
              extend: 'excelHtml5',
              text: 'Excel',
              title: exportTitle,
              className: 'btn btn-outline-dark btn-sm',
              exportOptions: {
                columns: ':not(.not-export)'
              }
            },
            {
              extend: 'print',
              text: 'Imprimir',
              title: exportTitle,
              className: 'btn btn-outline-dark btn-sm',
              exportOptions: {
                columns: ':not(.not-export)'
              }
            }
          ],
          initComplete: function() {
            const wrapper = tableElement.closest('.dataTables_wrapper');
            if (wrapper) {
              wrapper.classList.add('clinic-datatable-ready');
            }
          }
        });

        const tableId = tableElement.id;
        root.querySelectorAll(`[data-table-pill="${tableId}"]`).forEach((pill) => {
          if (pill.dataset.ready === '1') {
            return;
          }
          pill.dataset.ready = '1';
          pill.addEventListener('click', (event) => {
            event.preventDefault();
            const value = pill.dataset.value || '';
            const column = Number(pill.dataset.column || 0);
            root.querySelectorAll(`[data-table-pill="${tableId}"]`).forEach((otherPill) => {
              otherPill.classList.remove('active');
            });
            pill.classList.add('active');

            if (!value) {
              instance.column(column).search('').draw();
              return;
            }
            instance.column(column).search(`^${value}$`, true, false).draw();
          });
        });
      });
    }

    async function submitConfirmedAction(trigger) {
      const response = await fetch(trigger.dataset.actionUrl, {
        method: 'POST',
        headers: {
          'X-Requested-With': 'XMLHttpRequest',
          'X-CSRFToken': getCsrfToken(),
        },
      });

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.message || 'O processamento falhou.');
      }

      showFeedback('success', 'Sucesso', data.message || 'Operação concluída com sucesso.');
      setTimeout(() => {
        if (data.redirect_url) {
          window.location.href = data.redirect_url;
          return;
        }
        window.location.reload();
      }, 900);
    }

    function initConfirmActions(root) {
      root.querySelectorAll('[data-confirm-action]').forEach((trigger) => {
        if (trigger.dataset.ready === '1') {
          return;
        }
        trigger.dataset.ready = '1';
        trigger.addEventListener('click', async (event) => {
          event.preventDefault();

          const result = await Swal.fire({
            icon: trigger.dataset.confirmIcon || 'warning',
            title: trigger.dataset.confirmTitle || 'Confirmar',
            text: trigger.dataset.confirmText || 'Deseja continuar?',
            showCancelButton: true,
            confirmButtonText: trigger.dataset.confirmButton || 'Confirmar',
            cancelButtonText: 'Cancelar',
          });

          if (!result.isConfirmed) {
            return;
          }

          try {
            showProcessing('Processando...', 'Estamos a actualizar o estado.');
            await submitConfirmedAction(trigger);
          } catch (error) {
            console.error(error);
            showFeedback('error', 'Erro', error.message || 'A operação falhou.');
          }
        });
      });
    }

    function initClinicShell(root) {
      initModalTriggers(root);
      initFormSubmits(root);
      initWizards(root);
      initPermissionTables(root);
      initDataTables(root);
      initConfirmActions(root);
    }

    window.clinicShell = {
      init: initClinicShell,
      showProcessing,
      showFeedback,
    };

    document.addEventListener('DOMContentLoaded', () => {
      initClinicShell(document);
      showFlashMessages();
    });
  })();
</script>

{% load static ui_extras %}

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<meta name="description" content="{% ui 'Clinic Plus, painel operacional em estilo Material Dashboard.' 'Clinic Plus, operational dashboard in a Material Dashboard style.' %}">
<link rel="apple-touch-icon" sizes="76x76" href="{% if current_branch and current_branch.logo %}{{ current_branch.logo.url }}{% else %}{% static "assets/img/apple-icon.png" %}{% endif %}">
<link rel="icon" type="image/png" href="{% if current_branch and current_branch.favicon %}{{ current_branch.favicon.url }}{% else %}{% static "assets/img/favicon.png" %}{% endif %}">

<title>{{ meta_title|default:"Clinic Plus" }}</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700,900" />
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.bootstrap5.min.css">
<link href="{% static "assets/css/nucleo-icons.css" %}" rel="stylesheet" />
<link href="{% static "assets/css/nucleo-svg.css" %}" rel="stylesheet" />
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/js/all.min.js" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
<link id="pagestyle" href="{% static "assets/css/material-dashboard.css" %}?v=3.2.0" rel="stylesheet" />
